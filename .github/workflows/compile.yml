name: Compile ESP32 Voice Assistant

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Arduino CLI
      uses: arduino/setup-arduino-cli@v1

    - name: Install ESP32 Platform
      run: |
        arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
        arduino-cli core install esp32:esp32@2.0.4 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

    - name: Install U8g2 Library
      run: |
        arduino-cli lib install "U8g2"

    # Yahan hum saari .zip files ko dhoondh kar automatically extract kar rahe hain, naam jo bhi ho!
    - name: Install Edge Impulse ZIP Library
      run: |
        mkdir -p $HOME/Arduino/libraries/ml_lib
        unzip -q "*.zip" -d $HOME/Arduino/libraries/ml_lib

    - name: Prepare Sketch Folder
      run: |
        mkdir -p MyVoiceSketch
        cp "esp32 voice.ino" MyVoiceSketch/MyVoiceSketch.ino

    # Compilation step jisme humne library ke andar ke 'src' folder ka direct path de diya hai
    - name: Compile Sketch
      run: |
        arduino-cli compile --fqbn esp32:esp32:esp32 --libraries $HOME/Arduino/libraries/ml_lib --libraries $HOME/Arduino/libraries/ml_lib/src MyVoiceSketch/MyVoiceSketch.ino
